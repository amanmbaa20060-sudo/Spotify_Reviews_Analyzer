name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint (ruff)
        run: |
          ruff check .
      - name: Prepare test database
        env:
          AUTO_SEED_IF_EMPTY: "true"
        run: |
          python -c "from spotify_app_review_analyzer.db.init_db import init_database; init_database()"
          python scripts/render_seed.py
      - name: Tests
        run: |
          pytest -q
