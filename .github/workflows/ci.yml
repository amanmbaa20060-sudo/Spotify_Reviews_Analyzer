name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint (ruff)
        run: |
          ruff check .
      - name: Tests
        env:
          # Tests in Phase 1 don't require a DB connection.
          DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/spotify_reviews
        run: |
          pytest -q

