# Render Blueprint — Spotify App Review Analyzer API + dashboard
# Apply: https://dashboard.render.com/blueprint/new?repo=https://github.com/amanmbaa20060-sudo/Spotify_Reviews_Analyzer
databases:
  - name: spotify-reviews-db
    plan: free
    region: oregon
    databaseName: spotify_reviews
    user: spotify_reviews

services:
  - type: web
    name: spotify-review-analyzer-api
    runtime: python
    plan: free
    region: oregon
    branch: main
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt && pip install .
    startCommand: python scripts/start_render.py
    healthCheckPath: /health
    preDeployCommand: python -c "from spotify_app_review_analyzer.db.migrate import run_migrations; run_migrations()" && python scripts/render_seed.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: AUTO_SEED_IF_EMPTY
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: spotify-reviews-db
          property: connectionString
      - key: GROQ_API_KEY
        sync: false
